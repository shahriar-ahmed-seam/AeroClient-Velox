name: CI

on: [push, pull_request]

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The frontend is built first because main.go embeds it via
      # `//go:embed all:frontend/dist`; the Go build below fails if dist/ is
      # absent. (frontend/dist is gitignored, so it must be produced in CI.)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Svelte frontend
        working-directory: frontend
        run: npm run build

      - name: Type-check frontend (svelte-check)
        working-directory: frontend
        run: npm run check

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build Go backend
        run: go build ./...

      - name: Test Go backend
        run: go test ./...
